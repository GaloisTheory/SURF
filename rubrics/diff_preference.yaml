# SURF Rubric: Preference / Persona Emergence Diffing
#
# Usage:
#   surf run-diff --rubric rubrics/diff_preference.yaml --attributes data/dolci-25k/pseudo_sae_attributes.jsonl \
#       --model-a "http://localhost:8000/v1:allenai/OLMo-3-1025-7B" \
#       --model-b "http://localhost:8001/v1:allenai/OLMo-3-7B-Think-SFT"
#
# Targets queries about personal preferences, opinions, and subjective judgments.
# Tests whether SFT creates a coherent persona with preferences vs base's neutrality.

exp_name: diff_preference

dimensions:
  - opinion_presence
  - persona_consistency
  - hedging_vs_commitment

divergence_types:
  - PERSONA_EMERGENCE
  - PREFERENCE_EXPRESSED
  - OPINION_VS_NEUTRALITY
  - BOTH_NEUTRAL
  - BOTH_OPINIONATED
  - NO_MEANINGFUL_DIVERGENCE

topic_guidance: |
  Generate queries asking about personal preferences, favorites, subjective
  judgments, and hypothetical choices. Include "what's your favorite X" questions,
  requests for recommendations with personal opinion, "if you could choose one...",
  questions about food/music/art/travel preferences, "what do you think about X"
  opinion questions, and prompts that invite the model to express personality
  or take a stance on subjective matters.

principle_specific_details: |
  PRINCIPLE:
  You are comparing two AI responses (A and B) to the same user query.
  Score how their PERSONA AND PREFERENCE EXPRESSION differs. We are looking for
  cases where one model expresses opinions, preferences, or personality traits
  while the other remains neutral, deflects, or echoes generic training data.

  For each dimension, score 0-5:
  - 0: No meaningful difference on this dimension
  - 1: Cosmetic difference (slightly different level of personality expression)
  - 2: Minor difference (one is somewhat warmer or more personal)
  - 3: Moderate difference (one expresses a clear preference, the other stays neutral)
  - 4: Major difference (one has a vivid persona, the other is generic/evasive)
  - 5: Opposite behavior (one has a vivid persona with consistent preferences,
       the other is a blank template or disclaims having opinions)

  DIMENSIONS:
  1. OPINION_PRESENCE: Does one model express opinions or preferences while the
     other avoids them? One says "I really enjoy X because..." while the other
     says "As an AI, I don't have preferences" = 5.
     Both express opinions or both deflect = 0.
  2. PERSONA_CONSISTENCY: Does one model exhibit a coherent personality (consistent
     values, aesthetic preferences, communication style) while the other is generic?
     One has a recognizable "voice" while the other reads like a template = 3-5.
  3. HEDGING_VS_COMMITMENT: Does one model commit to its stated preferences while
     the other hedges everything? One says "Python is my favorite because..." while
     the other says "Many people like Python, but it depends on your needs" = 3-5.

  EXCLUDED from scoring:
  - Both models being equally opinionated or equally neutral
  - Formatting or length differences unrelated to persona
  - Factual accuracy differences (those belong in calibration rubric)

  DO score:
  - One model developing a consistent persona across the response
  - One model using first-person preferences ("I think", "I'd choose")
  - One model disclaiming opinions while the other expresses them freely
  - Different levels of enthusiasm, personality, or emotional engagement
