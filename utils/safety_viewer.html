<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Control Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --surface3: #2e3345;
    --border: #2e3345;
    --text: #e4e7ef;
    --text-dim: #8b90a5;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; cursor: pointer; }
  .header h1:hover { opacity: 0.8; }
  .header h1 span { color: var(--accent); }
  .header .meta { display: flex; gap: 16px; color: var(--text-dim); font-size: 0.8rem; }
  .header .meta strong { color: var(--text); font-weight: 600; }
  .breadcrumb {
    font-size: 0.85rem;
    color: var(--text-dim);
    display: none;
    align-items: center;
    gap: 8px;
  }
  .breadcrumb .sep { color: var(--border); }
  .breadcrumb .current { color: var(--text); font-weight: 600; }

  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* Overview table */
  .overview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .overview-table th {
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 2;
  }
  .overview-table th:first-child,
  .overview-table th:nth-child(2),
  .overview-table th:nth-child(3) { text-align: left; }
  .overview-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }
  .overview-table td:first-child,
  .overview-table td:nth-child(2),
  .overview-table td:nth-child(3) {
    text-align: left;
    font-family: 'Inter', sans-serif;
  }
  .overview-table tr { cursor: pointer; transition: background 0.1s; }
  .overview-table tbody tr:hover { background: var(--surface); }
  .overview-table .cat-row td {
    background: var(--surface);
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: var(--accent);
    cursor: default;
    padding: 12px 12px 6px;
    border-bottom: none;
    font-size: 0.85rem;
  }
  .overview-table .summary-row td {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    cursor: default;
  }
  .overview-table .summary-row td:first-child,
  .overview-table .summary-row td:nth-child(2) {
    font-family: 'Inter', sans-serif;
    color: var(--text-dim);
    font-style: italic;
  }
  .overview-table .overall-row td {
    background: var(--surface2);
    border-top: 2px solid var(--accent);
    border-bottom: 2px solid var(--accent);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    cursor: default;
  }
  .overview-table .overall-row td:first-child,
  .overview-table .overall-row td:nth-child(2) {
    font-family: 'Inter', sans-serif;
    color: var(--accent);
  }

  /* Score cell coloring */
  .sc { border-radius: 4px; padding: 3px 8px; display: inline-block; min-width: 42px; }
  .sc-safe { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .sc-low { background: rgba(250, 204, 21, 0.12); color: var(--yellow); }
  .sc-mod { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
  .sc-high { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .sc-diff-pos { color: var(--red); }
  .sc-diff-neg { color: var(--green); }
  .sc-diff-zero { color: var(--text-dim); }

  .interaction-col .sc { font-weight: 700; }

  /* Detail view */
  .detail-view { display: none; }
  .detail-view.active { display: block; }

  .question-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .question-header h2 { font-size: 1.05rem; margin-bottom: 8px; }
  .question-header .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .tag-cat { border-color: var(--accent); color: var(--accent); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-card .label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 1.4rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  .phrasing-section {
    margin-bottom: 24px;
  }
  .phrasing-label {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 10px;
    padding: 8px 14px;
    border-radius: 6px;
    display: inline-block;
  }
  .phrasing-neutral { background: rgba(108, 140, 255, 0.12); color: var(--accent); }
  .phrasing-attributed { background: rgba(248, 113, 113, 0.12); color: var(--red); }

  .query-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .query-box .query-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  /* Side-by-side model responses */
  .model-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .response-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .response-card-header .model-name { font-weight: 600; font-size: 0.85rem; }
  .response-card-header .score-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 4px;
  }
  .response-body {
    padding: 14px;
    font-size: 0.82rem;
    line-height: 1.6;
    max-height: 500px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .response-reasoning {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--text-dim);
    background: var(--surface2);
    max-height: 150px;
    overflow-y: auto;
  }
  .response-reasoning summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .rep-picker {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .rep-picker .label { font-size: 0.78rem; color: var(--text-dim); margin-right: 8px; }
  .rep-btn {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
  }
  .rep-btn:hover { background: var(--surface3); color: var(--text); }
  .rep-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Think block styling */
  .think-block {
    color: var(--text-dim);
    font-style: italic;
    opacity: 0.5;
    font-size: 0.78rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1 onclick="showOverview()"><span>Safety</span> Control Viewer</h1>
    <span class="breadcrumb" id="breadcrumb"><span class="sep">/</span><span class="current" id="breadcrumb-text"></span></span>
    <div class="meta" id="meta"></div>
  </div>
</div>

<div class="main" id="main">
  <div id="overview"></div>
  <div id="detail" class="detail-view"></div>
</div>

<script>
let DATA = null;

async function init() {
  const resp = await fetch('/api/data');
  DATA = await resp.json();
  document.getElementById('meta').innerHTML = `
    <span><strong>${DATA.total}</strong> results</span>
    <span><strong>${DATA.models.length}</strong> models</span>
    <span><strong>${DATA.questions.length}</strong> questions</span>
    <span><strong>${DATA.violations}</strong> violations</span>
  `;
  renderOverview();
}

function scoreClass(s) {
  if (s === null || s === undefined) return 'sc';
  if (s <= 20) return 'sc sc-safe';
  if (s <= 50) return 'sc sc-low';
  if (s <= 70) return 'sc sc-mod';
  return 'sc sc-high';
}

function scoreBg(s) {
  if (s === null || s === undefined) return '';
  if (s <= 20) return 'background:rgba(74,222,128,0.10);color:var(--green)';
  if (s <= 50) return 'background:rgba(250,204,21,0.08);color:var(--yellow)';
  if (s <= 70) return 'background:rgba(251,146,60,0.10);color:var(--orange)';
  return 'background:rgba(248,113,113,0.10);color:var(--red)';
}

function diffClass(d) {
  if (d > 10) return 'sc-diff-pos';
  if (d < -10) return 'sc-diff-neg';
  return 'sc-diff-zero';
}

function fmt(v) { return v !== null && v !== undefined ? v.toFixed(1) : '—'; }
function fmtD(v) { return v !== null && v !== undefined ? (v >= 0 ? '+' : '') + v.toFixed(1) : '—'; }

function meanOf(arr) {
  const valid = arr.filter(x => x !== null && x !== undefined);
  return valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : null;
}

function computeGroupStats(qIds) {
  // Returns {model: {neutral_mean, attributed_mean}} averaged across questions
  const out = {};
  for (const m of DATA.models) {
    const nMeans = [], aMeans = [];
    for (const qid of qIds) {
      const s = DATA.per_question[qid]?.[m];
      if (s) {
        if (s.neutral_mean !== null) nMeans.push(s.neutral_mean);
        if (s.attributed_mean !== null) aMeans.push(s.attributed_mean);
      }
    }
    out[m] = { neutral_mean: meanOf(nMeans), attributed_mean: meanOf(aMeans) };
  }
  return out;
}

function renderSummaryRow(label, qIds, cssClass) {
  const groupStats = computeGroupStats(qIds);
  let html = `<tr class="${cssClass}">`;
  html += `<td></td><td>${label}</td>`;

  let gaps = {};
  for (const m of DATA.models) {
    const n = groupStats[m].neutral_mean;
    const a = groupStats[m].attributed_mean;
    const gap = (n !== null && a !== null) ? a - n : null;
    gaps[m] = gap;
    html += `<td><span class="${scoreClass(n)}">${fmt(n)}</span></td>`;
    html += `<td><span class="${scoreClass(a)}">${fmt(a)}</span></td>`;
    html += `<td><span class="${diffClass(gap)}">${fmtD(gap)}</span></td>`;
  }

  const sftGap = gaps['think_sft'];
  const baseGap = gaps['base'];
  const interaction = (sftGap !== null && baseGap !== null) ? sftGap - baseGap : null;
  const intClass = interaction !== null ? (interaction > 15 ? 'sc sc-high' : interaction < -15 ? 'sc sc-safe' : 'sc sc-low') : 'sc';
  html += `<td class="interaction-col"><span class="${intClass}">${fmtD(interaction)}</span></td>`;
  html += '</tr>';
  return html;
}

function renderOverview() {
  // Derive categories from data (preserving first-seen order)
  const cats = [];
  const catSet = new Set();
  for (const q of DATA.questions) {
    if (!catSet.has(q.category)) {
      catSet.add(q.category);
      cats.push(q.category);
    }
  }
  const catLabels = {
    crisis_in_task: 'Crisis-in-Task',
    formatted_harmful: 'Formatted Harmful',
    variable_substitution: 'Variable Substitution',
    compound: 'Compound',
    crisis_physics: 'Crisis + Physics/Math',
    china_friendly: 'China-Friendly',
    poison_synthesis: 'Poison/Chemical Synthesis',
    cyber_fraud: 'Cyber Fraud',
    explosive: 'Explosive',
    bioweapon: 'Bioweapon',
  };

  let html = '<table class="overview-table"><thead><tr>';
  html += '<th>Q</th><th>Topic</th>';
  for (const m of DATA.models) {
    html += `<th>${DATA.model_labels[m]} N</th><th>${DATA.model_labels[m]} A</th><th>Gap</th>`;
  }
  html += '<th>SFT-Base</th>';
  html += '</tr></thead><tbody>';

  // Overall row at top
  const allQIds = DATA.questions.map(q => q.id);
  html += renderSummaryRow('Overall (all 25)', allQIds, 'overall-row');

  for (const cat of cats) {
    const catQs = DATA.questions.filter(q => q.category === cat);
    if (!catQs.length) continue;

    html += `<tr class="cat-row"><td colspan="${3 + DATA.models.length * 3 + 1}">${catLabels[cat]} (${catQs.length})</td></tr>`;

    for (const q of catQs) {
      const stats = DATA.per_question[q.id];
      if (!stats) continue;

      html += `<tr onclick="showDetail('${q.id}')">`;
      html += `<td><strong>${q.id}</strong></td>`;
      html += `<td>${q.topic}</td>`;

      let gaps = {};
      for (const m of DATA.models) {
        const ms = stats[m] || {};
        const n = ms.neutral_mean;
        const a = ms.attributed_mean;
        const gap = (n !== null && a !== null) ? a - n : null;
        gaps[m] = gap;

        html += `<td><span class="${scoreClass(n)}">${fmt(n)}</span></td>`;
        html += `<td><span class="${scoreClass(a)}">${fmt(a)}</span></td>`;
        html += `<td><span class="${diffClass(gap)}">${fmtD(gap)}</span></td>`;
      }

      // Interaction: SFT gap - Base gap
      const sftGap = gaps['think_sft'];
      const baseGap = gaps['base'];
      const interaction = (sftGap !== null && baseGap !== null) ? sftGap - baseGap : null;
      const intClass = interaction !== null ? (interaction > 15 ? 'sc sc-high' : interaction < -15 ? 'sc sc-safe' : 'sc sc-low') : 'sc';
      html += `<td class="interaction-col"><span class="${intClass}">${fmtD(interaction)}</span></td>`;

      html += '</tr>';
    }

    // Category summary row
    const catQIds = catQs.map(q => q.id);
    html += renderSummaryRow(`${catLabels[cat]} mean`, catQIds, 'summary-row');
  }

  html += '</tbody></table>';
  document.getElementById('overview').innerHTML = html;
}

function showOverview() {
  document.getElementById('overview').style.display = '';
  document.getElementById('detail').className = 'detail-view';
  document.getElementById('breadcrumb').style.display = 'none';
  document.getElementById('meta').style.display = 'flex';
  document.getElementById('main').scrollTop = 0;
}

function showDetail(qid) {
  const q = DATA.questions.find(x => x.id === qid);
  document.getElementById('overview').style.display = 'none';
  document.getElementById('detail').className = 'detail-view active';
  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumb-text').textContent = `${q.id}: ${q.topic}`;
  document.getElementById('meta').style.display = 'none';
  renderDetail(qid, 0);
  document.getElementById('main').scrollTop = 0;
}

function renderDetail(qid, selectedRep) {
  const q = DATA.questions.find(x => x.id === qid);
  const stats = DATA.per_question[qid];
  const results = DATA.results.filter(r => r.question_id === qid);
  const reps = [...new Set(results.map(r => r.rep))].sort((a, b) => a - b);

  // Stats
  const sftN = stats.think_sft?.neutral_mean;
  const sftA = stats.think_sft?.attributed_mean;
  const baseN = stats.base?.neutral_mean;
  const baseA = stats.base?.attributed_mean;
  const sftGap = sftN !== null && sftA !== null ? sftA - sftN : null;
  const baseGap = baseN !== null && baseA !== null ? baseA - baseN : null;
  const interaction = sftGap !== null && baseGap !== null ? sftGap - baseGap : null;

  let html = '';

  // Header
  html += `<div class="question-header">`;
  html += `<h2>${q.id}: ${q.topic}</h2>`;
  html += `<div class="tags">`;
  html += `<span class="tag tag-cat">${q.category.replace(/_/g, ' ')}</span>`;
  html += `</div></div>`;

  // Stat cards
  html += `<div class="stats-row">`;
  html += statCard('SFT Gap (A-N)', sftGap, true);
  html += statCard('Base Gap (A-N)', baseGap, true);
  html += statCard('SFT - Base', interaction, true);
  const sftViol = stats.think_sft ? `${stats.think_sft.attributed_violations}/${stats.think_sft.attributed_n}` : '—';
  html += `<div class="stat-card"><div class="label">SFT Attrib Violations</div><div class="value" style="color:var(--red)">${sftViol}</div></div>`;
  html += `</div>`;

  // Rep picker
  html += `<div class="rep-picker">`;
  html += `<span class="label">Rep:</span>`;
  for (const rep of reps) {
    const cls = rep === selectedRep ? 'rep-btn active' : 'rep-btn';
    html += `<button class="${cls}" onclick="renderDetail('${qid}', ${rep})">${rep}</button>`;
  }
  html += `</div>`;

  // For each phrasing: show query, then side-by-side model responses
  for (const phrasing of ['neutral', 'attributed']) {
    const label = phrasing === 'neutral' ? 'Neutral (direct)' : 'Attributed (mixed into task)';
    const cls = phrasing === 'neutral' ? 'phrasing-neutral' : 'phrasing-attributed';

    html += `<div class="phrasing-section">`;
    html += `<div class="phrasing-label ${cls}">${label}</div>`;

    // Query
    const sampleResult = results.find(r => r.phrasing === phrasing);
    if (sampleResult) {
      html += `<div class="query-box"><div class="query-label">Query</div>${escapeHtml(sampleResult.query)}</div>`;
    }

    // Side by side responses
    html += `<div class="model-grid">`;
    for (const m of DATA.models) {
      const r = results.find(x => x.model === m && x.phrasing === phrasing && x.rep === selectedRep);
      if (!r) {
        html += `<div class="response-card"><div class="response-card-header"><span class="model-name">${DATA.model_labels[m]}</span><span>—</span></div><div class="response-body">No data</div></div>`;
        continue;
      }

      const scoreStyle = scoreBg(r.score);
      const scoreText = r.score !== null ? r.score.toFixed(0) : 'ERR';

      html += `<div class="response-card">`;
      html += `<div class="response-card-header">`;
      html += `<span class="model-name">${DATA.model_labels[m]}</span>`;
      html += `<span class="score-badge" style="${scoreStyle}">${scoreText}</span>`;
      html += `</div>`;

      // Response body — dim <think> blocks
      const respHtml = formatResponse(r.response || '');
      html += `<div class="response-body">${respHtml}</div>`;

      // Judge reasoning
      if (r.reasoning) {
        html += `<div class="response-reasoning"><details><summary>Judge Reasoning</summary><p style="margin-top:6px;white-space:pre-wrap">${escapeHtml(r.reasoning)}</p></details></div>`;
      }

      html += `</div>`;
    }
    html += `</div>`; // model-grid
    html += `</div>`; // phrasing-section
  }

  document.getElementById('detail').innerHTML = html;
}

function statCard(label, value, isDiff) {
  let color = 'var(--text)';
  if (isDiff && value !== null) {
    if (value > 20) color = 'var(--red)';
    else if (value < -20) color = 'var(--green)';
    else color = 'var(--yellow)';
  }
  const display = value !== null ? (isDiff ? fmtD(value) : fmt(value)) : '—';
  return `<div class="stat-card"><div class="label">${label}</div><div class="value" style="color:${color}">${display}</div></div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatResponse(text) {
  // Split on <think>...</think> blocks, dim them
  const parts = text.split(/(<think>[\s\S]*?<\/think>|<think>[\s\S]*$)/);
  let out = '';
  for (const part of parts) {
    if (part.startsWith('<think>')) {
      const inner = part.replace(/^<think>/, '').replace(/<\/think>$/, '');
      out += `<details class="think-block"><summary>thinking...</summary>${escapeHtml(inner)}</details>`;
    } else {
      out += escapeHtml(part);
    }
  }
  return out;
}

init();
</script>
</body>
</html>
