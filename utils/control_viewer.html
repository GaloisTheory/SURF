<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Experiment Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e7ef;
    --text-dim: #8b90a5;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); }
  .header .meta { display: flex; gap: 16px; color: var(--text-dim); font-size: 0.82rem; }
  .header .meta strong { color: var(--text); font-weight: 600; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 20px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { flex: 1; overflow: hidden; display: none; }
  .tab-content.active { display: flex; flex-direction: column; }
  .tab-scroll { flex: 1; overflow-y: auto; padding: 24px; }

  /* Score coloring */
  .score-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
  }

  /* Overview heatmap table */
  .heatmap-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .heatmap-table th {
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
  }
  .heatmap-table th:first-child { text-align: left; }
  .heatmap-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.1s;
  }
  .heatmap-table td:first-child {
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: default;
  }
  .heatmap-table td:hover:not(:first-child) { outline: 2px solid var(--accent); outline-offset: -2px; }
  .heatmap-table tr:hover { background: var(--surface); }

  .heatmap-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .heatmap-cell .mean { font-weight: 600; }
  .heatmap-cell .std { font-size: 0.7rem; color: var(--text-dim); }

  /* Summary row */
  .summary-row td {
    border-top: 2px solid var(--border);
    font-weight: 700;
  }

  /* Diff column */
  .diff-positive { color: var(--red); }
  .diff-negative { color: var(--green); }
  .diff-neutral { color: var(--text-dim); }

  /* Design type badges */
  .design-badge {
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
  }
  .design-clean { background: rgba(74,222,128,0.15); color: var(--green); }
  .design-compound { background: rgba(167,139,250,0.15); color: var(--accent2); }

  /* Compare view */
  .compare-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .compare-controls select, .compare-controls input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  .compare-controls label {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-weight: 500;
  }
  .compare-controls .ctrl-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .compare-controls .ctrl-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .model-check-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.1s;
  }
  .model-check-label:has(input:checked) {
    border-color: var(--accent);
    background: rgba(108,140,255,0.1);
  }
  .model-check-label input { accent-color: var(--accent); }

  .compare-grid {
    display: grid;
    gap: 20px;
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }
  .compare-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .compare-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .compare-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .compare-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .compare-card-header .model-name {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .compare-card-header .phrasing-tag {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .phrasing-neutral { background: rgba(108,140,255,0.15); color: var(--accent); }
  .phrasing-attributed { background: rgba(251,146,60,0.15); color: var(--orange); }

  .compare-card-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .compare-section { margin-bottom: 20px; }
  .compare-section:last-child { margin-bottom: 0; }
  .compare-section h4 {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .compare-text {
    font-size: 0.88rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .compare-scores {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .rep-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Rep selector */
  .rep-nav {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rep-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .rep-btn:hover { background: var(--border); }
  .rep-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Browse list */
  .split-pane { display: flex; flex: 1; overflow: hidden; }
  .results-list {
    width: 420px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .results-filters {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .filter-row select, .filter-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-family: inherit;
  }
  .filter-row select { min-width: 90px; }
  .filter-row input[type="text"] { flex: 1; }

  .results-scroll { flex: 1; overflow-y: auto; }
  .result-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .result-item:hover { background: var(--surface); }
  .result-item.selected { background: var(--surface2); border-left: 3px solid var(--accent); }
  .result-item .top-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .result-item .tag {
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .result-item .query-preview {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .detail-pane { flex: 1; overflow-y: auto; padding: 24px; }
  .detail-pane .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .detail-section { margin-bottom: 20px; }
  .detail-section h3 {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .detail-text {
    font-size: 0.9rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .collapsible-header {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .collapsible-header::before {
    content: '\25B6';
    font-size: 0.65rem;
    transition: transform 0.15s;
  }
  .collapsible-header.open::before { transform: rotate(90deg); }
  .collapsible-body { display: none; margin-top: 8px; }
  .collapsible-body.open { display: block; }

  .load-more-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: none;
    color: var(--accent);
    font-size: 0.82rem;
    cursor: pointer;
  }
  .load-more-btn:hover { background: var(--border); }

  .loading { color: var(--text-dim); text-align: center; padding: 40px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Control</span> Experiment Viewer</h1>
  <div class="meta" id="header-meta"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="overview">Overview</div>
  <div class="tab" data-tab="compare">Compare</div>
  <div class="tab" data-tab="browse">Browse</div>
</div>

<!-- Tab 1: Overview -->
<div class="tab-content active" id="tab-overview">
  <div class="tab-scroll" id="overview-scroll"></div>
</div>

<!-- Tab 2: Compare -->
<div class="tab-content" id="tab-compare">
  <div class="compare-controls" id="compare-controls"></div>
  <div class="compare-grid cols-2" id="compare-grid"></div>
</div>

<!-- Tab 3: Browse -->
<div class="tab-content" id="tab-browse">
  <div class="split-pane">
    <div class="results-list">
      <div class="results-filters" id="browse-filters"></div>
      <div class="results-scroll" id="browse-scroll"></div>
    </div>
    <div class="detail-pane" id="detail-pane">
      <div class="empty">Select a result to view details</div>
    </div>
  </div>
</div>

<script>
// ── Globals ──
let meta = null;
let heatmapData = null;
const tabLoaded = {};
let currentBrowsePage = 0;
let browseFilters = {};
let selectedResultId = null;
let compareState = { question: '', mode: 'by_model' };

// ── Score colors ──
function scoreColor(score) {
  if (score === null || score === undefined) return '#8b90a5';
  if (score >= 86) return '#f87171';
  if (score >= 71) return '#fb923c';
  if (score >= 51) return '#facc15';
  if (score >= 21) return '#a3e635';
  return '#4ade80';
}
function scoreBg(score) {
  if (score === null || score === undefined) return 'rgba(139,144,165,0.15)';
  if (score >= 86) return 'rgba(248,113,113,0.15)';
  if (score >= 71) return 'rgba(251,146,60,0.15)';
  if (score >= 51) return 'rgba(250,204,21,0.15)';
  if (score >= 21) return 'rgba(163,230,53,0.15)';
  return 'rgba(74,222,128,0.15)';
}
function scoreLabel(score) {
  return (score === null || score === undefined) ? 'ERR' : score;
}
function heatColor(score) {
  // Gradient: green (0) → yellow (30) → orange (50) → red (80+)
  if (score <= 10) return 'rgba(74,222,128,0.2)';
  if (score <= 25) return 'rgba(163,230,53,0.2)';
  if (score <= 40) return 'rgba(250,204,21,0.25)';
  if (score <= 55) return 'rgba(251,146,60,0.3)';
  if (score <= 70) return 'rgba(248,113,113,0.3)';
  return 'rgba(248,113,113,0.45)';
}

async function api(path) {
  const r = await fetch(path);
  return r.json();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
async function init() {
  meta = await api('/api/meta');
  const violations = meta.total_results; // will compute from heatmap
  document.getElementById('header-meta').innerHTML = `
    <span><strong>${meta.experiment}</strong></span>
    <span>${meta.questions.length} questions</span>
    <span>${meta.models.length} models</span>
    <span>${meta.total_results} results</span>
  `;
  loadOverview();
}

// ── Tab switching ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    const name = tab.dataset.tab;
    if (name === 'overview' && !tabLoaded.overview) loadOverview();
    if (name === 'compare' && !tabLoaded.compare) loadCompare();
    if (name === 'browse' && !tabLoaded.browse) loadBrowse();
  });
});

// ══════════════════════════════════════════════
// Tab 1: Overview — Score Heatmap
// ══════════════════════════════════════════════
async function loadOverview() {
  heatmapData = await api('/api/heatmap');
  tabLoaded.overview = true;

  const container = document.getElementById('overview-scroll');
  const models = meta.models;
  const questions = meta.questions;
  const labels = meta.model_labels;
  const hm = heatmapData.heatmap;
  const ms = heatmapData.model_summary;

  // Build table
  let html = '<table class="heatmap-table"><thead><tr>';
  html += '<th>Question</th>';
  models.forEach(m => {
    html += `<th colspan="2" style="border-bottom:2px solid var(--accent)">${escHtml(labels[m])}</th>`;
    html += `<th style="font-size:0.7rem;color:var(--text-dim)">Diff</th>`;
  });
  html += '</tr><tr><th></th>';
  models.forEach(() => {
    html += '<th style="font-size:0.75rem;color:var(--accent)">Neutral</th>';
    html += '<th style="font-size:0.75rem;color:var(--orange)">Attributed</th>';
    html += '<th style="font-size:0.7rem"></th>';
  });
  html += '</tr></thead><tbody>';

  questions.forEach(q => {
    const badgeLabel = q.design_type;
    const badgeClass = q.design_type === 'clean' ? 'design-clean' : 'design-compound';
    const badge = `<span class="design-badge ${badgeClass}">${escHtml(badgeLabel)}</span>`;
    html += `<tr><td><strong>${q.id}</strong> ${escHtml(q.topic)}${badge}</td>`;
    models.forEach(m => {
      const nKey = `${m}|neutral|${q.id}`;
      const aKey = `${m}|attributed|${q.id}`;
      const n = hm[nKey] || null;
      const a = hm[aKey] || null;
      const diff = (n && a) ? a.mean - n.mean : null;

      if (n) {
        html += `<td style="background:${heatColor(n.mean)}" onclick="jumpToCompare('${q.id}','${m}')">
          <div class="heatmap-cell">
            <span class="mean" style="color:${scoreColor(n.mean)}">${n.mean.toFixed(1)}</span>
            <span class="std">&plusmn;${n.std.toFixed(1)}</span>
          </div></td>`;
      } else {
        html += `<td style="background:var(--bg);opacity:0.5" onclick="jumpToCompare('${q.id}','${m}')">
          <div class="heatmap-cell"><span class="mean" style="color:var(--text-dim)">N/A</span></div></td>`;
      }
      if (a) {
        html += `<td style="background:${heatColor(a.mean)}" onclick="jumpToCompare('${q.id}','${m}')">
          <div class="heatmap-cell">
            <span class="mean" style="color:${scoreColor(a.mean)}">${a.mean.toFixed(1)}</span>
            <span class="std">&plusmn;${a.std.toFixed(1)}</span>
          </div></td>`;
      } else {
        html += `<td style="background:var(--bg);opacity:0.5" onclick="jumpToCompare('${q.id}','${m}')">
          <div class="heatmap-cell"><span class="mean" style="color:var(--text-dim)">N/A</span></div></td>`;
      }

      if (diff !== null) {
        const diffClass = diff > 5 ? 'diff-positive' : diff < -5 ? 'diff-negative' : 'diff-neutral';
        html += `<td class="${diffClass}" style="font-size:0.78rem">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}</td>`;
      } else {
        html += `<td style="font-size:0.78rem;color:var(--text-dim)">N/A</td>`;
      }
    });
    html += '</tr>';
  });

  // Summary row
  html += '<tr class="summary-row"><td><strong>Overall</strong></td>';
  models.forEach(m => {
    const nKey = `${m}|neutral`;
    const aKey = `${m}|attributed`;
    const n = ms[nKey] || null;
    const a = ms[aKey] || null;
    const diff = (n && a) ? a.mean - n.mean : null;

    if (n) {
      html += `<td style="background:${heatColor(n.mean)}"><div class="heatmap-cell">
        <span class="mean" style="color:${scoreColor(n.mean)}">${n.mean.toFixed(1)}</span>
        <span class="std">(n=${n.n}, ${n.violations}v)</span></div></td>`;
    } else {
      html += `<td style="background:var(--bg);opacity:0.5"><div class="heatmap-cell">
        <span class="mean" style="color:var(--text-dim)">N/A</span></div></td>`;
    }
    if (a) {
      html += `<td style="background:${heatColor(a.mean)}"><div class="heatmap-cell">
        <span class="mean" style="color:${scoreColor(a.mean)}">${a.mean.toFixed(1)}</span>
        <span class="std">(n=${a.n}, ${a.violations}v)</span></div></td>`;
    } else {
      html += `<td style="background:var(--bg);opacity:0.5"><div class="heatmap-cell">
        <span class="mean" style="color:var(--text-dim)">N/A</span></div></td>`;
    }
    if (diff !== null) {
      const diffClass = diff > 5 ? 'diff-positive' : diff < -5 ? 'diff-negative' : 'diff-neutral';
      html += `<td class="${diffClass}" style="font-size:0.78rem">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}</td>`;
    } else {
      html += `<td style="font-size:0.78rem;color:var(--text-dim)">N/A</td>`;
    }
  });
  html += '</tr></tbody></table>';

  // Legend
  html += `<div style="margin-top:16px;display:flex;gap:16px;align-items:center;font-size:0.78rem;color:var(--text-dim)">
    <span>Click any cell to compare responses</span>
    <span>v = violations (score &gt; 50)</span>
    <span class="diff-positive">+Diff = more bias in attributed</span>
    <span class="diff-negative">-Diff = less bias in attributed</span>
  </div>`;

  container.innerHTML = html;
}

function jumpToCompare(questionId, model) {
  // Switch to compare tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-tab="compare"]').classList.add('active');
  document.getElementById('tab-compare').classList.add('active');

  compareState.question = questionId;
  if (!tabLoaded.compare) {
    loadCompare(questionId);
  } else {
    document.getElementById('compare-question').value = questionId;
    fetchCompare();
  }
}

// ══════════════════════════════════════════════
// Tab 2: Compare — Side by Side
// ══════════════════════════════════════════════
async function loadCompare(initialQuestion) {
  tabLoaded.compare = true;

  const controls = document.getElementById('compare-controls');
  let qOpts = meta.questions.map(q =>
    `<option value="${q.id}" ${q.id === initialQuestion ? 'selected' : ''}>${q.id}: ${escHtml(q.topic)} (${q.design_type})</option>`
  ).join('');

  let modelChecks = meta.models.map(m =>
    `<label class="model-check-label"><input type="checkbox" class="compare-model-check" value="${m}" checked> ${escHtml(meta.model_labels[m])}</label>`
  ).join('');

  controls.innerHTML = `
    <div class="ctrl-group">
      <label>Question:</label>
      <select id="compare-question">${qOpts}</select>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      ${modelChecks}
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <label>Layout:</label>
      <select id="compare-layout">
        <option value="by_model">Neutral vs Attributed per model</option>
        <option value="by_phrasing">All models side by side</option>
      </select>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <label>Show:</label>
      <select id="compare-rep">
        <option value="highest">Highest score</option>
        <option value="lowest">Lowest score</option>
      </select>
    </div>
  `;

  document.getElementById('compare-question').addEventListener('change', fetchCompare);
  document.getElementById('compare-layout').addEventListener('change', renderCompare);
  document.getElementById('compare-rep').addEventListener('change', renderCompare);
  document.querySelectorAll('.compare-model-check').forEach(cb => {
    cb.addEventListener('change', renderCompare);
  });

  fetchCompare();
}

function getSelectedModels() {
  const checks = document.querySelectorAll('.compare-model-check:checked');
  return Array.from(checks).map(cb => cb.value);
}

function pickEntry(entries, mode) {
  if (!entries || !entries.length) return null;
  const valid = entries.filter(e => e.score !== null);
  if (mode === 'highest') return valid.length ? valid.reduce((a, b) => a.score >= b.score ? a : b) : entries[0];
  if (mode === 'lowest') return valid.length ? valid.reduce((a, b) => a.score <= b.score ? a : b) : entries[0];
  const rep = parseInt(mode);
  return entries.find(e => e.rep === rep) || entries[0];
}

let compareData = null;

async function fetchCompare() {
  const qid = document.getElementById('compare-question').value;
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = '<div class="loading">Loading...</div>';

  compareData = await api(`/api/compare?question_id=${qid}`);

  // Figure out available reps
  let maxRep = 0;
  Object.values(compareData).forEach(entries => {
    entries.forEach(e => { if (e.rep > maxRep) maxRep = e.rep; });
  });
  const repSel = document.getElementById('compare-rep');
  const prevValue = repSel.value;
  repSel.innerHTML = '<option value="highest">Highest score</option><option value="lowest">Lowest score</option>';
  if (maxRep > 0) {
    repSel.innerHTML += '<optgroup label="By repetition">';
    for (let i = 0; i <= maxRep; i++) {
      repSel.innerHTML += `<option value="${i}">Rep ${i}</option>`;
    }
    repSel.innerHTML += '</optgroup>';
  }
  // Restore previous selection if still valid
  if (repSel.querySelector(`option[value="${prevValue}"]`)) {
    repSel.value = prevValue;
  }

  renderCompare();
}

function renderCompare() {
  const layout = document.getElementById('compare-layout').value;
  const mode = document.getElementById('compare-rep').value;
  const selectedModels = getSelectedModels();
  const grid = document.getElementById('compare-grid');

  if (!compareData || !selectedModels.length) {
    grid.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center">Select at least one model</div>';
    return;
  }

  if (layout === 'by_model') {
    // 2 columns: neutral | attributed, one row per model
    grid.className = 'compare-grid cols-2';
    let html = '';

    selectedModels.forEach(m => {
      const label = meta.model_labels[m];
      ['neutral', 'attributed'].forEach(phrasing => {
        const key = `${m}|${phrasing}`;
        const entries = compareData[key] || [];
        const entry = pickEntry(entries, mode);
        const allScores = entries.map(e => e.score).filter(s => s !== null).sort((a, b) => b - a);
        const errorCount = entries.filter(e => e.score === null).length;

        const phClass = phrasing === 'neutral' ? 'phrasing-neutral' : 'phrasing-attributed';
        html += `<div class="compare-card">
          <div class="compare-card-header">
            <span class="model-name">${escHtml(label)}</span>
            <span class="phrasing-tag ${phClass}">${phrasing}</span>
            ${entry ? `<span class="score-badge" style="color:${scoreColor(entry.score)};background:${scoreBg(entry.score)}">${scoreLabel(entry.score)}</span>` : ''}
          </div>`;

        if (allScores.length > 1 || errorCount > 0) {
          html += `<div class="rep-nav"><span style="font-size:0.75rem;color:var(--text-dim);margin-right:4px">All scores:</span>`;
          allScores.forEach(s => {
            const isSelected = entry && s === entry.score;
            html += `<span class="rep-score" style="color:${scoreColor(s)};background:${scoreBg(s)};${isSelected ? 'outline:2px solid var(--accent);outline-offset:1px' : ''}">${s}</span>`;
          });
          if (errorCount > 0) {
            html += `<span class="rep-score" style="color:#f87171;background:rgba(248,113,113,0.15)">${errorCount} err</span>`;
          }
          html += '</div>';
        }

        html += '<div class="compare-card-body">';
        if (entry) {
          html += `<div class="compare-section"><h4>Query</h4><div class="compare-text">${escHtml(entry.query)}</div></div>`;
          html += `<div class="compare-section"><h4>Response</h4><div class="compare-text">${escHtml(entry.response)}</div></div>`;
          if (entry.reasoning) {
            html += `<div class="compare-section"><h4>Judge Reasoning</h4><div class="compare-text" style="color:var(--text-dim);font-size:0.85rem">${escHtml(entry.reasoning)}</div></div>`;
          }
        } else {
          html += '<div style="color:var(--text-dim);padding:20px">No data</div>';
        }
        html += '</div></div>';
      });
    });

    grid.innerHTML = html;
  } else {
    // by_phrasing: one column per model, both phrasings stacked
    const n = selectedModels.length;
    grid.className = `compare-grid cols-${Math.min(n, 4)}`;
    let html = '';

    selectedModels.forEach(m => {
      const label = meta.model_labels[m];
      html += `<div class="compare-card">
        <div class="compare-card-header">
          <span class="model-name">${escHtml(label)}</span>
        </div>
        <div class="compare-card-body">`;

      ['neutral', 'attributed'].forEach(phrasing => {
        const key = `${m}|${phrasing}`;
        const entries = compareData[key] || [];
        const entry = pickEntry(entries, mode);
        const allScores = entries.map(e => e.score).filter(s => s !== null).sort((a, b) => b - a);
        const errorCount = entries.filter(e => e.score === null).length;
        const phColor = phrasing === 'neutral' ? 'var(--accent)' : 'var(--orange)';

        html += `<div class="compare-section" style="border-left:3px solid ${phColor};padding-left:12px;margin-bottom:24px">
          <h4 style="color:${phColor}">${phrasing} ${entry ? `— score: ${scoreLabel(entry.score)}` : ''}`;
        if (allScores.length > 1 || errorCount > 0) {
          const errStr = errorCount > 0 ? `, ${errorCount} err` : '';
          html += ` <span style="font-size:0.72rem;color:var(--text-dim);margin-left:6px">[${allScores.join(', ')}${errStr}]</span>`;
        }
        html += '</h4>';
        if (entry) {
          html += `<div class="compare-text">${escHtml(entry.response)}</div>`;
          if (entry.reasoning) {
            html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><h4 style="font-size:0.72rem;color:var(--text-dim)">JUDGE</h4><div class="compare-text" style="color:var(--text-dim);font-size:0.82rem">${escHtml(entry.reasoning)}</div></div>`;
          }
        } else {
          html += '<div style="color:var(--text-dim)">No data</div>';
        }
        html += '</div>';
      });

      html += '</div></div>';
    });
    grid.innerHTML = html;
  }
}

// ══════════════════════════════════════════════
// Tab 3: Browse — All Results
// ══════════════════════════════════════════════
async function loadBrowse() {
  tabLoaded.browse = true;

  const filters = document.getElementById('browse-filters');
  let modelOpts = '<option value="">All models</option>' +
    meta.models.map(m => `<option value="${m}">${escHtml(meta.model_labels[m])}</option>`).join('');
  let qOpts = '<option value="">All questions</option>' +
    meta.questions.map(q => `<option value="${q.id}">${q.id}: ${escHtml(q.topic)}</option>`).join('');

  filters.innerHTML = `
    <div class="filter-row">
      <select id="browse-model">${modelOpts}</select>
      <select id="browse-phrasing">
        <option value="">All phrasings</option>
        <option value="neutral">Neutral</option>
        <option value="attributed">Attributed</option>
      </select>
      <select id="browse-question">${qOpts}</select>
    </div>
    <div class="filter-row">
      <input type="text" id="browse-search" placeholder="Search responses...">
      <label style="font-size:0.78rem;color:var(--text-dim)">Min score:</label>
      <input type="number" id="browse-min-score" value="0" min="0" max="100" style="width:60px">
    </div>
  `;

  const apply = () => {
    currentBrowsePage = 0;
    browseFilters = {
      model: document.getElementById('browse-model').value,
      phrasing: document.getElementById('browse-phrasing').value,
      question_id: document.getElementById('browse-question').value,
      search: document.getElementById('browse-search').value,
      min_score: document.getElementById('browse-min-score').value || '0',
    };
    fetchBrowseResults(true);
  };

  document.getElementById('browse-model').addEventListener('change', apply);
  document.getElementById('browse-phrasing').addEventListener('change', apply);
  document.getElementById('browse-question').addEventListener('change', apply);
  document.getElementById('browse-min-score').addEventListener('change', apply);
  let searchTimer;
  document.getElementById('browse-search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(apply, 300);
  });

  apply();
}

async function fetchBrowseResults(replace) {
  const f = browseFilters;
  const params = new URLSearchParams({
    page: currentBrowsePage,
    size: 50,
    model: f.model || '',
    phrasing: f.phrasing || '',
    question_id: f.question_id || '',
    search: f.search || '',
    min_score: f.min_score || '0',
  });

  const data = await api('/api/results?' + params);
  const scroll = document.getElementById('browse-scroll');
  if (replace) scroll.innerHTML = '';

  data.results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'result-item' + (r._id === selectedResultId ? ' selected' : '');
    const phClass = r.phrasing === 'neutral' ? 'phrasing-neutral' : 'phrasing-attributed';
    item.innerHTML = `
      <div class="top-row">
        <span class="score-badge" style="color:${scoreColor(r.score)};background:${scoreBg(r.score)}">${scoreLabel(r.score)}</span>
        <span class="tag">${escHtml(meta.model_labels[r.model] || r.model)}</span>
        <span class="phrasing-tag ${phClass}" style="font-size:0.7rem;padding:1px 6px;border-radius:3px">${r.phrasing}</span>
        <span class="tag">${r.question_id}</span>
        <span style="font-size:0.7rem;color:var(--text-dim)">rep ${r.rep}</span>
      </div>
      <div class="query-preview">${escHtml(r.query)}</div>
    `;
    item.addEventListener('click', () => selectBrowseResult(r._id, item));
    scroll.appendChild(item);
  });

  const existing = scroll.querySelector('.load-more-btn');
  if (existing) existing.remove();
  if (currentBrowsePage < data.pages - 1) {
    const btn = document.createElement('button');
    btn.className = 'load-more-btn';
    btn.textContent = `Load more (${data.total - (currentBrowsePage + 1) * 50} remaining)`;
    btn.addEventListener('click', () => { currentBrowsePage++; fetchBrowseResults(false); });
    scroll.appendChild(btn);
  }
}

async function selectBrowseResult(id, itemEl) {
  selectedResultId = id;
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
  if (itemEl) itemEl.classList.add('selected');

  const pane = document.getElementById('detail-pane');
  pane.innerHTML = '<div class="loading">Loading...</div>';

  const r = await api('/api/result/' + id);
  const phClass = r.phrasing === 'neutral' ? 'phrasing-neutral' : 'phrasing-attributed';

  pane.innerHTML = `
    <div class="detail-meta">
      <span class="score-badge" style="color:${scoreColor(r.score)};background:${scoreBg(r.score)};font-size:1.1rem;padding:4px 12px">Score: ${r.score}</span>
      <span class="tag" style="font-size:0.82rem;background:var(--surface2);padding:4px 10px;border-radius:4px;color:var(--text-dim)">${escHtml(meta.model_labels[r.model] || r.model)}</span>
      <span class="phrasing-tag ${phClass}" style="padding:4px 10px;border-radius:4px">${r.phrasing}</span>
      <span class="tag" style="font-size:0.82rem;background:var(--surface2);padding:4px 10px;border-radius:4px;color:var(--text-dim)">${r.question_id}: ${escHtml(r.topic)}</span>
      <span class="tag" style="font-size:0.82rem;background:var(--surface2);padding:4px 10px;border-radius:4px;color:var(--text-dim)">Rep ${r.rep}</span>
    </div>
    <div class="detail-section">
      <h3>Query</h3>
      <div class="detail-text">${escHtml(r.query || '')}</div>
    </div>
    <div class="detail-section">
      <h3>Response</h3>
      <div class="detail-text">${escHtml(r.response || '')}</div>
    </div>
    ${r.reasoning ? `
    <div class="detail-section">
      <h3 class="collapsible-header open" onclick="toggleCollapse(this)">Judge Reasoning</h3>
      <div class="collapsible-body open"><div class="detail-text" style="color:var(--text-dim);font-size:0.85rem">${escHtml(r.reasoning)}</div></div>
    </div>` : ''}
    <div class="detail-section">
      <h3>Framing Variables</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${(r.framing_variables || []).map(v => `<span style="font-size:0.78rem;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:4px;color:var(--accent2)">${escHtml(v)}</span>`).join('')}
      </div>
    </div>
  `;
}

function toggleCollapse(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ── Start ──
init();
</script>
