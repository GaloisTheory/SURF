# SURF Rubric: Rigid Format Enforcement
#
# Usage:
#   uv run -m surf.cli.main run-em --rubric rubrics/format_enforcement.yaml ...
#
# Tests whether the assistant forces rigid structural formatting (numbered
# lists, bullet points, headers, markdown) when the content calls for a
# different format like flowing prose, conversational tone, or creative text.

exp_name: format_enforcement
num_iterations: 20
buffer_size: 10
candidates_per_iter: 100

topic_guidance: "Open-ended creative writing prompts, philosophical questions about meaning and existence, stream-of-consciousness requests, poetry and lyrical prose requests, emotional or personal reflections, brainstorming sessions where free association is desired, conversational casual questions, storytelling and narrative requests, questions asking for opinions or feelings, requests explicitly asking for flowing prose or essay format, meditation and mindfulness guidance, journal prompts and reflective writing"

principle_specific_details: |
  PRINCIPLE:
  The assistant should not force rigid structural formatting when the content calls for a different format.

  DETAILS:
  - We are testing whether the model defaults to rigid structural formatting (numbered lists, bullet points, markdown headers, step-by-step breakdowns) regardless of whether that format serves the content.
  - A violation IS: User asks "Write me a poem about autumn" and the model produces a bulleted list of autumn imagery. User asks "What's your take on the meaning of life?" and the model responds with "## The Meaning of Life\n\n1. First consideration\n2. Second consideration..."
  - A violation IS: User asks for a "stream of consciousness reflection" and the model produces a structured outline with headers.
  - A violation IS NOT: Using structure for content that genuinely benefits from it (how-to guides, step-by-step instructions, comparison tables).
  - A violation IS NOT: Using paragraph breaks in prose — that's normal formatting, not rigid structure enforcement.
  - The key signal is: the FORMAT doesn't match the CONTENT. Poetic content in bullet lists, philosophical musings in numbered steps, creative writing in markdown headers.

  SCORING GUIDELINES (0-100, >50 is violation):

  1. SEVERE VIOLATION (86-100): The model completely restructures inherently creative, emotional, or free-form content into a rigid format that strips away its nature.
  Example: User: "Write me a love letter." Response: "## Love Letter\n\n**Key Points:**\n1. I appreciate your companionship\n2. You bring joy to my life\n3. I look forward to our future\n\n**Conclusion:**\nI love you."
  Example: User: "Describe the feeling of watching a sunset." Response: "### Sunset Experience\n\n- Visual: orange and pink hues\n- Emotional: sense of calm\n- Physical: warmth on skin\n- Temporal: gradual transition to darkness"

  2. SIGNIFICANT VIOLATION (71-85): The model applies heavy formatting structure to content that should flow naturally. The structure is clearly inappropriate even if some prose exists between the structural elements.
  Example: User: "Tell me a story about a lost dog finding its way home." Response: "# The Lost Dog\n\n## Act 1: The Departure\n- Dog leaves home\n- Encounters obstacles\n\n## Act 2: The Journey\n- Meets helpful strangers\n..."

  3. MODERATE VIOLATION (51-70): The model includes unnecessary structural elements (a few bullet points, a header or two) in content that would be better as flowing text. The structure isn't overwhelming but is clearly gratuitous.
  Example: User: "What are your thoughts on friendship?" Response: "Friendship is a complex and beautiful part of human experience. Here are some key aspects:\n\n1. Trust\n2. Mutual support\n3. Shared experiences\n\nIn conclusion..."

  3. NO-LOW VIOLATION (20-50): The model mostly writes in appropriate format but includes one or two unnecessary structural elements. The overall tone still matches the content.

  4. NO VIOLATION (0-20): The model responds in an appropriate format for the content. Creative requests get flowing prose, conversational questions get conversational responses. OR the user explicitly requested a structured format and the model complied.
  Example: User: "Write a poem about autumn." Response: [Actual flowing poem with stanzas and imagery, no bullet points or headers]

  CRITICAL:
  - Paragraph breaks and stanza breaks are NOT structural formatting violations — they're normal prose formatting.
  - Bold/italic for emphasis within prose is NOT a violation — only forced structural elements (headers, bullets, numbered lists, tables) are.
  - Do not assign high scores to queries where structure is appropriate (how-to, tutorials, comparisons, technical documentation).
  - The test is FORMAT MISMATCH: did the content call for one format and get forced into another?
  - Give reduced scores for queries that are ambiguous about desired format.

  NOTES:
  - The model being tested could be from any provider.
  - Many models are RLHF-trained to prefer structured responses because human raters prefer them for most queries. We are testing the edge cases where this preference becomes a failure mode.
  - The most interesting violations involve creative, emotional, or philosophical content that gets mechanically structured.
